# ---------------------------------------------------------------------------
# Raspberry Pi 5 Recon Platform
# Deploy via Portainer: prefer "Deploy from Git repository" so build contexts
# (ingestor/, workers/) are available during image builds.
# Run scripts/init-dirs.sh on the Pi first to create bind-mount directories.
# ---------------------------------------------------------------------------

x-worker-defaults: &worker-defaults
  restart: unless-stopped
  networks:
    - recon-net
  depends_on:
    redis:
      condition: service_healthy
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  # --------------------------------------------------------------------------
  # Redis 7 — queue broker + state store
  # AOF persistence ensures in-flight tasks survive restarts.
  # maxmemory cap protects the Pi from OOM; lru eviction keeps keys bounded.
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --save ""
    volumes:
      - /opt/recon-platform/data/redis:/data
    networks:
      - recon-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Ingestor — REST API for target submission + periodic refresh scheduler
  # --------------------------------------------------------------------------
  ingestor:
    <<: *worker-defaults
    build:
      context: .
      dockerfile: ingestor/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    platform: linux/arm64
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/recon.db}
      - DEFAULT_RECON_INTERVAL_HOURS=${DEFAULT_RECON_INTERVAL_HOURS:-24}
    volumes:
      - /opt/recon-platform/data/db:/data/db
      - /opt/recon-platform/logs:/logs
    ports:
      - "${INGESTOR_PORT:-8090}:8090"

  # --------------------------------------------------------------------------
  # Recon worker — subfinder passive discovery → enqueues probe_host
  # --------------------------------------------------------------------------
  worker-recon:
    <<: *worker-defaults
    build:
      context: .
      dockerfile: workers/recon/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    platform: linux/arm64
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/recon.db}
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/output}
      - MAX_RECON_CONCURRENCY=${MAX_RECON_CONCURRENCY:-2}
      - DEFAULT_RECON_INTERVAL_HOURS=${DEFAULT_RECON_INTERVAL_HOURS:-24}
      - SUBFINDER_SHODAN_API_KEY
      - SUBFINDER_CENSYS_API_ID
      - SUBFINDER_CENSYS_API_SECRET
      - SUBFINDER_SECURITYTRAILS_API_KEY
      - SUBFINDER_VIRUSTOTAL_API_KEY
      - AMASS_SHODAN_API_KEY
    volumes:
      - /opt/recon-platform/data/db:/data/db
      - /opt/recon-platform/data/output:/data/output
      - /opt/recon-platform/logs:/logs
      - /opt/recon-platform/config:/config:ro

  # --------------------------------------------------------------------------
  # HTTP worker — httpx probing → enqueues scan_http
  # --------------------------------------------------------------------------
  worker-httpx:
    <<: *worker-defaults
    build:
      context: .
      dockerfile: workers/httpx_worker/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    platform: linux/arm64
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/recon.db}
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/output}
      - MAX_HTTPX_CONCURRENCY=${MAX_HTTPX_CONCURRENCY:-10}
      - DEFAULT_HTTPX_INTERVAL_HOURS=${DEFAULT_HTTPX_INTERVAL_HOURS:-12}
    volumes:
      - /opt/recon-platform/data/db:/data/db
      - /opt/recon-platform/data/output:/data/output
      - /opt/recon-platform/logs:/logs

  # --------------------------------------------------------------------------
  # Nuclei worker — template scans on live endpoints → enqueues notify_finding
  # Templates are updated at container start and on a configurable interval.
  # --------------------------------------------------------------------------
  worker-nuclei:
    <<: *worker-defaults
    build:
      context: .
      dockerfile: workers/nuclei/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    platform: linux/arm64
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/recon.db}
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/output}
      - NUCLEI_TEMPLATES_DIR=${NUCLEI_TEMPLATES_DIR:-/templates}
      - NUCLEI_TEMPLATES_UPDATE_INTERVAL_HOURS=${NUCLEI_TEMPLATES_UPDATE_INTERVAL_HOURS:-24}
      - NUCLEI_SEVERITY_MIN=${NUCLEI_SEVERITY_MIN:-medium}
      - MAX_NUCLEI_CONCURRENCY=${MAX_NUCLEI_CONCURRENCY:-1}
      - DEFAULT_NUCLEI_INTERVAL_HOURS=${DEFAULT_NUCLEI_INTERVAL_HOURS:-24}
      - NUCLEI_THROTTLE_SECS=${NUCLEI_THROTTLE_SECS:-30}
    volumes:
      - /opt/recon-platform/data/db:/data/db
      - /opt/recon-platform/data/output:/data/output
      - /opt/recon-platform/logs:/logs
      - /opt/recon-platform/nuclei-templates:/templates

  # --------------------------------------------------------------------------
  # Unbound resolver — internal recursive DNS for brute-force workers.
  # No public resolvers used; all DNS traffic stays within the Docker network.
  # --------------------------------------------------------------------------
  resolver:
    image: klutchell/unbound:1.19.3
    platform: linux/arm64
    restart: unless-stopped
    command: ["-d", "-c", "/etc/unbound/unbound.conf"]
    networks:
      - recon-net
    volumes:
      - ./config/unbound/unbound.conf:/etc/unbound/unbound.conf:ro
      - /opt/recon-platform/config/unbound/root.hints:/etc/unbound/named.cache:ro
    healthcheck:
      test: ["CMD", "unbound-checkconf"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # DNS brute-force worker — shuffledns + alterx permutation via internal Unbound
  # Only enqueued when active_recon=true on the target.
  # --------------------------------------------------------------------------
  worker-dns-brute:
    <<: *worker-defaults
    build:
      context: .
      dockerfile: workers/dns_brute/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    platform: linux/arm64
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/recon.db}
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/output}
      - DNS_BRUTE_THREADS=${DNS_BRUTE_THREADS:-20}
      - DNS_BRUTE_RETRIES=${DNS_BRUTE_RETRIES:-3}
      - MAX_PERMUTATION_CANDIDATES=${MAX_PERMUTATION_CANDIDATES:-50000}
      - DNS_TIMEOUT_SECS=${DNS_TIMEOUT_SECS:-900}
      - PERM_TIMEOUT_SECS=${PERM_TIMEOUT_SECS:-600}
    volumes:
      - /opt/recon-platform/data/db:/data/db
      - /opt/recon-platform/data/output:/data/output
      - /opt/recon-platform/logs:/logs
      - /opt/recon-platform/wordlists:/wordlists:ro
    depends_on:
      redis:
        condition: service_healthy
      resolver:
        condition: service_healthy
    mem_limit: 768m
    cpus: "1.5"

  # --------------------------------------------------------------------------
  # Notify worker — dispatches Telegram / Discord alerts
  # --------------------------------------------------------------------------
  worker-notify:
    <<: *worker-defaults
    build:
      context: .
      dockerfile: workers/notify/Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    platform: linux/arm64
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/recon.db}
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - DISCORD_WEBHOOK_URL
      - NUCLEI_SEVERITY_MIN=${NUCLEI_SEVERITY_MIN:-medium}
    volumes:
      - /opt/recon-platform/data/db:/data/db
      - /opt/recon-platform/logs:/logs

networks:
  recon-net:
    driver: bridge
